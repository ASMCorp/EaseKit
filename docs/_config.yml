title: EaseKit
description: A lightweight Swift Package with convenient extensions for UIKit and SwiftUI. Simplify iOS development with hex colors, Auto Layout helpers, and UIView utilities.
baseurl: "/EaseKit"
url: "https://asmcorp.github.io"

# Build settings
markdown: kramdown
theme: minima
permalink: /blog/:year/:month/:day/:title.html
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-feed

# SEO defaults
defaults:
  - scope:
      path: ""
    values:
      image: "/assets/og-image.png"

# Site settings
lang: en_US
author: ASMCorp

# Navigation
header_pages:
  - getting-started.md
  - api-reference.md
  - examples.md
  - blog.html

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - README.md
